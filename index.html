<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recharge">
<title>Recharge 自我充电</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf7f4;--bg-warm:#f5efe8;
  --card-bg:#fff;--card-border:rgba(0,0,0,.05);--card-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --coral:#e8725c;--coral-soft:rgba(232,114,92,.10);--coral-glow:rgba(232,114,92,.25);
  --amber:#d4943a;--amber-soft:rgba(212,148,58,.10);
  --sage:#6a9e7e;--sage-soft:rgba(106,158,126,.10);
  --plum:#9474b4;--plum-soft:rgba(148,116,180,.10);
  --sky:#5b94c4;--sky-soft:rgba(91,148,196,.10);
  --orange:#e09850;--orange-soft:rgba(224,152,80,.10);
  --text:#2c2420;--text-mid:#6b5e56;--text-dim:#9e9189;--text-light:#c4b8ae;
  --done-bg:#f0f7f2;--done-text:#9eb8a6;
  --radius:16px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;overflow-x:hidden;background-image:url('bg.png');background-size:cover;background-position:center top;background-attachment:fixed;background-repeat:no-repeat;position:relative}
body::before{content:'';position:fixed;inset:0;background:rgba(250,247,244,0.82);pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}

.header{padding:52px 24px 20px;position:relative;overflow:hidden;background:linear-gradient(165deg,rgba(253,246,240,0.92) 0%,rgba(252,238,228,0.88) 40%,rgba(249,228,216,0.85) 100%)}
.header::before{content:'';position:absolute;top:-30px;right:-20px;width:180px;height:180px;background:radial-gradient(circle,var(--coral-glow) 0%,transparent 65%);border-radius:50%;pointer-events:none}
.header::after{content:'';position:absolute;bottom:-40px;left:20px;width:120px;height:120px;background:radial-gradient(circle,rgba(212,148,58,.15) 0%,transparent 65%);border-radius:50%;pointer-events:none}
.brand{display:flex;align-items:center;gap:10px;position:relative}
.brand-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--coral),var(--amber));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 10px var(--coral-glow)}
.brand h1{font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;letter-spacing:-.3px}
.brand h1 em{font-style:italic;color:var(--coral)}
.header .sub{font-size:13px;color:var(--text-dim);margin-top:6px;font-weight:300;padding-left:52px}

.energy{margin:-1px 0 0;background:linear-gradient(180deg,rgba(249,228,216,0.85) 0%,rgba(250,247,244,0.8) 100%);padding:16px 24px 20px}
.energy-card{background:rgba(255,255,255,0.93);border-radius:var(--radius);padding:18px;box-shadow:var(--card-shadow);position:relative;overflow:hidden}
.energy-card::after{content:'⚡';position:absolute;right:16px;top:14px;font-size:32px;opacity:.08}
.energy-main{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.energy-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.energy-pct{font-family:'DM Serif Display',serif;font-size:32px;color:var(--coral)}
.energy-pct small{font-family:'Noto Sans SC';font-size:13px;font-weight:400;color:var(--text-dim)}
.bar-track{height:8px;background:var(--bg-warm);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.25,1,.5,1);position:relative}
.bar-fill.main{background:linear-gradient(90deg,var(--coral),var(--amber))}
.bar-fill.main::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));border-radius:0 4px 4px 0}
.dims{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-top:14px}
.dim{display:flex;flex-direction:column;gap:4px}
.dim-top{display:flex;justify-content:space-between;align-items:center}
.dim-label{font-size:11px;color:var(--text-dim);font-weight:500}
.dim-pct{font-size:11px;font-weight:600}
.dim-pct.body{color:var(--sage)}.dim-pct.look{color:var(--coral)}.dim-pct.exp{color:var(--plum)}.dim-pct.kids{color:var(--sky)}.dim-pct.food{color:var(--orange)}
.dim-bar{height:5px;background:var(--bg-warm);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width .5s ease}
.dim-fill.body{background:var(--sage)}.dim-fill.look{background:var(--coral)}.dim-fill.exp{background:var(--plum)}.dim-fill.kids{background:var(--sky)}.dim-fill.food{background:var(--orange)}

.tomorrow{margin:0 24px 12px;background:linear-gradient(135deg,rgba(255,248,240,0.85),rgba(255,245,235,0.85));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(232,114,92,.12);border-radius:var(--radius);padding:14px 16px;display:none}
.tomorrow.has-items{display:block}
.tomorrow-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tomorrow-title{font-size:13px;font-weight:600;color:var(--coral)}
.tomorrow-clear{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;font-family:inherit}
.tomorrow-items{display:flex;flex-direction:column;gap:4px}
.tomorrow-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;background:white;border-radius:8px;border:1px solid rgba(0,0,0,.04)}
.t-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.t-dot.body{background:var(--sage)}.t-dot.look{background:var(--coral)}.t-dot.exp{background:var(--plum)}.t-dot.kids{background:var(--sky)}.t-dot.food{background:var(--orange)}
.t-name{flex:1;color:var(--text-mid)}.t-remove{font-size:14px;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0 2px}

.kids-bar{margin:0 24px 12px;background:rgba(212,148,58,0.08);border:1px solid rgba(212,148,58,.15);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-mid)}
.kids-bar select{background:white;border:1px solid rgba(212,148,58,.25);color:var(--amber);border-radius:6px;padding:4px 8px;font-size:13px;font-family:inherit;font-weight:500;outline:none;max-width:180px}
.kids-bar .hint{color:var(--amber);opacity:.6;font-size:11px;margin-left:auto}

.tabs{display:flex;margin:0 24px 12px;background:rgba(255,255,255,0.9);border-radius:var(--radius-sm);border:1px solid var(--card-border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:0 0 auto;padding:10px 11px;font-size:11px;font-weight:500;text-align:center;color:var(--text-dim);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--coral);color:white;border-radius:var(--radius-sm)}

.filters{padding:0 24px 8px;display:flex;flex-direction:column;gap:8px}
.filter-row-label{font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--card-border);background:rgba(255,255,255,0.88);color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.a-all{background:var(--bg-warm);border-color:var(--text-light);color:var(--text-mid)}
.chip.a-area{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}

.sec-label{padding:14px 24px 4px;font-size:11px;color:var(--text-light);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}

.group{margin:0 24px 10px;animation:fadeUp .25s ease both}
.group-head{display:flex;align-items:center;gap:7px;padding:10px 0 4px;cursor:pointer}
.g-exp{font-size:10px;color:var(--text-light);transition:transform .2s;display:inline-block}
.g-exp.open{transform:rotate(90deg)}
.g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.g-dot.body{background:var(--sage)}.g-dot.look{background:var(--coral)}.g-dot.exp{background:var(--plum)}.g-dot.kids{background:var(--sky)}.g-dot.food{background:var(--orange)}
.g-title{font-size:14px;font-weight:600;color:var(--text-mid);flex:1}
.g-title.done-t{color:var(--done-text);text-decoration:line-through}
.g-count-label{font-size:11px;color:var(--text-light);font-weight:400}
.g-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:500}
.tag-appt{background:var(--coral-soft);color:var(--coral)}.tag-date{background:var(--plum-soft);color:var(--plum)}.tag-walk{background:var(--sage-soft);color:var(--sage)}.tag-nearby{background:var(--amber-soft);color:var(--amber)}
.g-actions{display:flex;align-items:center;gap:5px}
.g-plan-btn{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--text-light);background:none;color:var(--text-light);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.g-plan-btn:active{transform:scale(.9)}
.g-plan-btn.planned{background:var(--coral);border-color:var(--coral);color:white}
.g-counter{display:flex;align-items:center;gap:2px}
.cnt-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--text-light);background:none;color:var(--text-dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cnt-btn:active{transform:scale(.88)}
.cnt-num{font-size:12px;font-weight:600;min-width:32px;text-align:center;color:var(--coral)}

.shops-wrap{display:none;padding-left:16px;border-left:2px solid rgba(0,0,0,.04);margin-left:3px;margin-top:4px;flex-direction:column;gap:6px}
.shops-wrap.open{display:flex}

.sub-card{background:rgba(255,255,255,0.92);border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.03);border:1px solid var(--card-border);transition:all .2s}
.sub-card.done-c{background:var(--done-bg);box-shadow:none;border-color:transparent}
.sub-card.done-c .s-name{color:var(--done-text);text-decoration:line-through}
.sub-card.nearby-highlight{border-color:var(--amber);border-width:1.5px}
.sub-top{display:flex;align-items:center;gap:10px}
.sub-info{flex:1;min-width:0}
.s-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.s-name{font-size:13px;font-weight:500}
.s-name a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--text-light)}
.s-area{font-size:9px;padding:1px 6px;border-radius:8px;background:var(--amber-soft);color:var(--amber);font-weight:500}
.s-note{font-size:11px;color:var(--text-dim);margin-top:2px;font-style:italic}
.s-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--text-light);background:none;color:var(--text-light);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.s-check:active{transform:scale(.9)}
.s-check.checked{background:var(--sage);border-color:var(--sage);color:white}

.s-expand-btn{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:6px;padding:2px 0;display:flex;align-items:center;gap:3px}
.s-expand-btn .arr{font-size:9px;display:inline-block;transition:transform .2s}
.s-expand-btn.open .arr{transform:rotate(90deg)}
.s-guide{display:none;margin-top:6px}
.s-guide.show{display:block}
.s-guide textarea{width:100%;background:var(--bg-warm);border:1px solid rgba(0,0,0,.06);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;resize:vertical;outline:none;min-height:50px;line-height:1.6}
.s-guide textarea:focus{border-color:var(--coral)}
.s-guide-saved{font-size:12px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap;padding:4px 0}

.g-note{margin:8px 0 0;padding-top:8px;border-top:1px solid rgba(0,0,0,.04)}
.note-toggle{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 0}
.note-input{width:100%;margin-top:4px;background:var(--bg-warm);border:1px solid rgba(0,0,0,.06);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;resize:none;outline:none;display:none}
.note-input:focus{border-color:var(--coral)}
.note-input.show{display:block}
.note-saved{font-size:12px;color:var(--text-dim);margin-top:3px;font-style:italic}

.empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty .emoji{font-size:32px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SHOP LINKS ROW */
.s-links{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.s-link{font-size:11px;padding:3px 8px;border-radius:6px;text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:500}
.s-link.dzdp{background:#ff6633;color:white}
.s-link.xhs{background:#fe2c55;color:white}
.s-link-edit{font-size:11px;color:var(--text-light);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 0;margin-left:2px}

/* ADD SHOP BTN */
.add-shop-btn{width:100%;padding:10px;border:1.5px dashed var(--text-light);border-radius:10px;background:none;color:var(--text-dim);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:2px}
.add-shop-btn:active{transform:scale(.98);border-color:var(--coral);color:var(--coral)}

/* PANEL OVERLAY */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;opacity:0;transition:opacity .25s}
.panel-overlay.show{display:block;opacity:1}

/* BOTTOM PANEL */
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,1,.5,1);max-height:85vh;overflow-y:auto;padding:20px 24px 36px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.panel.show{transform:translateY(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-title{font-size:16px;font-weight:600}
.panel-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-warm);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel-field{margin-bottom:14px}
.panel-label{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:4px;display:block}
.panel-input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.panel-input:focus{border-color:var(--coral)}
.panel-input::placeholder{color:var(--text-light)}
.panel-select{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.panel-row{display:flex;gap:10px}
.panel-row .panel-field{flex:1}
.panel-actions{display:flex;gap:10px;margin-top:18px}
.panel-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.panel-btn:active{transform:scale(.97)}
.panel-btn.primary{background:var(--coral);color:white}
.panel-btn.secondary{background:var(--bg-warm);color:var(--text-mid)}
.panel-btn.danger{background:none;color:#d44;font-size:12px;font-weight:500;padding:8px;flex:0 0 auto}
</style>
</head>
<body>
<div class="header">
  <div class="brand"><div class="brand-icon">⚡</div><h1><em>Recharge</em> 自我充电</h1></div>
  <div class="sub">重庆 · 6/7 — 6/22 · 属于我的16天</div>
</div>

<div class="energy"><div class="energy-card">
  <div class="energy-main"><span class="energy-label">总能量</span><span class="energy-pct" id="totalPct">0<small>%</small></span></div>
  <div class="bar-track"><div class="bar-fill main" id="totalBar" style="width:0%"></div></div>
  <div class="dims">
    <div class="dim"><div class="dim-top"><span class="dim-label">💪身体</span><span class="dim-pct body" id="dimBody">0%</span></div><div class="dim-bar"><div class="dim-fill body" id="barBody" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">✨形象</span><span class="dim-pct look" id="dimLook">0%</span></div><div class="dim-bar"><div class="dim-fill look" id="barLook" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">🎭体验</span><span class="dim-pct exp" id="dimExp">0%</span></div><div class="dim-bar"><div class="dim-fill exp" id="barExp" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">👦带娃</span><span class="dim-pct kids" id="dimKids">0%</span></div><div class="dim-bar"><div class="dim-fill kids" id="barKids" style="width:0%"></div></div></div>
    <div class="dim"><div class="dim-top"><span class="dim-label">🍜美食</span><span class="dim-pct food" id="dimFood">0%</span></div><div class="dim-bar"><div class="dim-fill food" id="barFood" style="width:0%"></div></div></div>
  </div>
</div></div>

<div class="tomorrow" id="tmrw">
  <div class="tomorrow-header"><span class="tomorrow-title">📋 明天要做</span><button class="tomorrow-clear" onclick="clearTmrw()">清空</button></div>
  <div class="tomorrow-items" id="tmrwItems"></div>
</div>

<div class="kids-bar">
  <span>👦</span><span>娃在上</span>
  <select id="kidsAct">
    <option value="">不筛选</option>
    <option value="新光天地">跑酷（新光天地）</option>
    <option value="龙湖花园">下棋（龙湖花园·家边上）</option>
    <option value="placeholder_a">活动C（待填）</option>
    <option value="placeholder_b">活动D（待填）</option>
  </select>
  <span class="hint">📍 附近优先</span>
</div>

<div class="tabs">
  <button class="tab active" data-tab="all" onclick="setTab('all')">全部</button>
  <button class="tab" data-tab="body" onclick="setTab('body')">💪身体</button>
  <button class="tab" data-tab="look" onclick="setTab('look')">✨形象</button>
  <button class="tab" data-tab="exp" onclick="setTab('exp')">🎭体验</button>
  <button class="tab" data-tab="kids" onclick="setTab('kids')">👦带娃</button>
  <button class="tab" data-tab="food" onclick="setTab('food')">🍜美食</button>
</div>

<div class="filters"><div><div class="filter-row-label">商圈</div><div class="filter-row" id="areaFilters"></div></div></div>
<div id="content"></div>

<!-- Edit Panel -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <span class="panel-title" id="panelTitle">添加店铺</span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-field">
    <label class="panel-label">店名 *</label>
    <input class="panel-input" id="pName" placeholder="比如：富侨足浴">
  </div>
  <div class="panel-row">
    <div class="panel-field">
      <label class="panel-label">商圈</label>
      <input class="panel-input" id="pArea" list="areaList" placeholder="比如：解放碑">
      <datalist id="areaList"></datalist>
    </div>
  </div>
  <div class="panel-row">
    <div class="panel-field">
      <label class="panel-label">大众点评链接</label>
      <input class="panel-input" id="pDzdp" placeholder="粘贴链接" type="url">
    </div>
    <div class="panel-field">
      <label class="panel-label">小红书链接</label>
      <input class="panel-input" id="pXhs" placeholder="粘贴链接" type="url">
    </div>
  </div>
  <div class="panel-field">
    <label class="panel-label">备注</label>
    <input class="panel-input" id="pNote" placeholder="比如：小红书推荐的，说环境好">
  </div>
  <div class="panel-actions">
    <button class="panel-btn danger" id="pDel" onclick="delShop()" style="display:none">删除</button>
    <button class="panel-btn secondary" onclick="closePanel()">取消</button>

// Approximate WGS84 coords for major Chongqing commercial areas
const AREA_COORDS={
  '新光天地':[29.5225,106.4855],
  '爱琴海':[29.5260,106.4920],
  '龙湖时代天街':[29.5180,106.4710],
  '解放碑':[29.5570,106.5780],
  '观音桥':[29.5730,106.5730],
  '南坪':[29.5330,106.5710],
  '杨家坪':[29.5170,106.5120],
  '沙坪坝':[29.5710,106.4540],
  '大坪':[29.5400,106.5260],
  '江北嘴':[29.5680,106.5830],
  '磁器口':[29.5800,106.4480],
  '龙湖花园':[29.5200,106.4750],
  '渝中':[29.5530,106.5690],
  '江北':[29.5750,106.5740],
  '南岸':[29.5280,106.5720],
  '九龙坡':[29.5020,106.5110],
  '渝北':[29.6180,106.6310],
};

function getCoord(area){return AREA_COORDS[area]||null}
function distKm(a,b){
  if(!a||!b)return 999;
  const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function shopDist(shop,targetArea){
  const tc=getCoord(targetArea),sc=getCoord(shop.area);
  return distKm(tc,sc);
}
function closestShopDist(item,targetArea){
  if(!targetArea)return 999;
  return Math.min(...item.shops.map(s=>shopDist(s,targetArea)));
}

let items,planned,catFilter='all',areaFilter='all',kidsArea='';

function cp(i){return{...i,shops:i.shops.map(s=>({...s}))}}
function loadData(){try{const s=localStorage.getItem(SK);if(s){const p=JSON.parse(s);return ITEMS.map(def=>{const sv=p.find(x=>x.id===def.id);if(!sv)return cp(def);const ms=def.shops.map((d,i)=>{const ss=sv.shops&&sv.shops[i];return ss?{...d,...ss}:{...d}});if(sv.shops&&sv.shops.length>def.shops.length)for(let i=def.shops.length;i<sv.shops.length;i++)ms.push(sv.shops[i]);return{...def,...sv,shops:ms}})}}catch(e){}return ITEMS.map(cp)}
function save(){localStorage.setItem(SK,JSON.stringify(items))}

function savePlan(){localStorage.setItem(PK,JSON.stringify(planned))}
function isDone(it){return it.type==='check'?it.shops.some(s=>s.done):it.count>=it.target}
function getAreas(it){return[...new Set(it.shops.map(s=>s.area).filter(a=>a&&a!=='待定'))]}
function allAreas(){const a=new Set();items.forEach(it=>it.shops.forEach(s=>{if(s.area&&s.area!=='待定')a.add(s.area)}));return[...a].sort()}

// Energy
function calcE(){
  const c={body:{d:0,t:0},look:{d:0,t:0},exp:{d:0,t:0},kids:{d:0,t:0},food:{d:0,t:0}};
  let tE=0,tP=0;
  items.forEach(it=>{const cat=c[it.cat];if(!cat)return;const p=it.pts||8;
    if(it.type==='counter'){const f=it.target>0?it.count/it.target:0;cat.d+=p*f;cat.t+=p;tE+=p*f}
    else{const d=isDone(it);cat.d+=d?p:0;cat.t+=p;tE+=d?p:0}
    tP+=p;});
  return{c,tE,tP};
}
function updateE(){
  const e=calcE();const tp=e.tP>0?Math.round(e.tE/e.tP*100):0;
  document.getElementById('totalPct').innerHTML=`${tp}<small>%</small>`;
  document.getElementById('totalBar').style.width=tp+'%';
  ['body','look','exp','kids','food'].forEach(k=>{
    const v=e.c[k];const p=v.t>0?Math.round(v.d/v.t*100):0;
    const C=k[0].toUpperCase()+k.slice(1);
    document.getElementById('dim'+C).textContent=p+'%';
    document.getElementById('bar'+C).style.width=p+'%';
  });
}

function buildChips(){
  const a=allAreas();const el=document.getElementById('areaFilters');

  a.forEach(x=>{h+=`<div class="chip ${areaFilter===x?'a-area':''}" data-area="${x}">${x}</div>`});
  el.innerHTML=h;
}

// Tomorrow
function renderTmrw(){
  const w=document.getElementById('tmrw'),l=document.getElementById('tmrwItems');
  if(!planned.length){w.classList.remove('has-items');return}
  w.classList.add('has-items');
  l.innerHTML=planned.map(pid=>{const it=items.find(i=>i.id===pid);if(!it)return'';return`<div class="tomorrow-item"><div class="t-dot ${it.cat}"></div><span class="t-name">${it.title}</span><button class="t-remove" onclick="removePlan('${pid}')">✕</button></div>`}).join('');
}
function togglePlan(id){const i=planned.indexOf(id);if(i>=0)planned.splice(i,1);else planned.push(id);savePlan();renderTmrw();render()}
function removePlan(id){planned=planned.filter(p=>p!==id);savePlan();renderTmrw();render()}
function clearTmrw(){planned=[];savePlan();renderTmrw();render()}

function setTab(cat){catFilter=cat;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===cat));render()}

function sortProx(arr,area){
  if(!area)return arr;
  return[...arr].sort((a,b)=>closestShopDist(a,area)-closestShopDist(b,area));
}

function render(){
  const el=document.getElementById('content');
  let f=items.filter(it=>{
    if(catFilter!=='all'&&it.cat!==catFilter)return false;
    if(areaFilter!=='all'){const a=getAreas(it);if(!a.includes(areaFilter)&&!it.shops.some(s=>s.area==='待定'))return false}
    return true;
  });
  if(kidsArea)f=sortProx(f,kidsArea);
  const un=f.filter(i=>!isDone(i)),dn=f.filter(i=>isDone(i));
  if(!f.length){el.innerHTML=`<div class="empty"><div class="emoji">🔍</div><p>没有匹配的项目</p></div>`;updateE();return}

  function rg(it,forceOpen){
    const done=isDone(it),pl=planned.includes(it.id);
    const itemDist=kidsArea?closestShopDist(it,kidsArea):999;
    const isNear=itemDist<3;
    const autoOpen=forceOpen||false;
    let tags='';
    if(kidsArea&&isNear)tags+=`<span class="tag tag-nearby">📍${itemDist<1?'<1km':itemDist.toFixed(1)+'km'}</span>`;
    if(it.appt)tags+=`<span class="tag tag-appt">🔖预约</span>`;
    if(it.eventDate)tags+=`<span class="tag tag-date">📅${it.eventDate}</span>`;
    if(!it.appt&&!it.eventDate)tags+=`<span class="tag tag-walk">随时去</span>`;

    let right=`<button class="g-plan-btn ${pl?'planned':''}" onclick="event.stopPropagation();togglePlan('${it.id}')">📋</button>`;
    if(it.type==='counter')right=`<div class="g-counter"><button class="cnt-btn" onclick="event.stopPropagation();chgCnt('${it.id}',-1)">−</button><span class="cnt-num">${it.count}/${it.target}</span><button class="cnt-btn" onclick="event.stopPropagation();chgCnt('${it.id}',1)">+</button></div>`+right;

    // Sort shops by distance when kidsArea active
    let sortedShops=[...it.shops];
    if(kidsArea){sortedShops.sort((a,b)=>shopDist(a,kidsArea)-shopDist(b,kidsArea))}

    // When kidsArea: show only closest shop, rest hidden behind "show all"
    const showOnlyClosest = kidsArea && sortedShops.length > 1;

    const sc=sortedShops.map((s,sortIdx)=>{
      const idx=it.shops.indexOf(s);
      const sd=s.done||false;
      const sn=s.note?`<div class="s-note">${s.note}</div>`:'';
      const hg=s.guide&&s.guide.trim();
      const dist=kidsArea?shopDist(s,kidsArea):999;
      const isClose=dist<3;
      // Distance label
      const distLabel=kidsArea&&s.area!=='待定'?`<span style="font-size:9px;color:${isClose?'var(--sage)':'var(--text-light)'};margin-left:4px">${dist<1?'<1km':dist.toFixed(1)+'km'}</span>`:'';
      // Links row
      let links='';
      if(s.url||s.xhs){
        links='<div class="s-links">';
        if(s.url)links+=`<a class="s-link dzdp" href="${s.url}" target="_blank">📍 大众点评</a>`;
        if(s.xhs)links+=`<a class="s-link xhs" href="${s.xhs}" target="_blank">📕 小红书</a>`;
        links+='</div>';
      }
      let ck='';if(it.type==='check')ck=`<button class="s-check ${sd?'checked':''}" onclick="event.stopPropagation();togShop('${it.id}',${idx})">${sd?'✓':''}</button>`;
      const hidden=showOnlyClosest&&sortIdx>0?'style="display:none" data-extra="1"':'';
      return`<div class="sub-card ${sd?'done-c':''} ${isClose?'nearby-highlight':''}" ${hidden}><div class="sub-top"><div class="sub-info"><div class="s-name-row"><span class="s-name">${s.name}</span><span class="s-area">${s.area}</span>${distLabel}<button class="s-link-edit" onclick="event.stopPropagation();openEdit('${it.id}',${idx})">✏️</button></div>${sn}${links}</div>${ck}</div><button class="s-expand-btn" onclick="event.stopPropagation();togGuide(this)"><span class="arr">▸</span>${hg?'📝攻略':'📝写攻略'}</button><div class="s-guide">${hg?`<div class="s-guide-saved">${s.guide}</div>`:''}` +
        `<textarea placeholder="攻略、价格、怎么去、小红书tips…" onblur="saveG('${it.id}',${idx},this)">${s.guide||''}</textarea></div></div>`;
    }).join('');

    const showAllBtn=showOnlyClosest?`<button class="add-shop-btn" style="border-style:solid;font-size:11px;padding:8px" onclick="event.stopPropagation();showAllShops(this)">查看全部 ${sortedShops.length} 家 ▾</button>`:'';
    const addBtn=`<button class="add-shop-btn" onclick="event.stopPropagation();openAdd('${it.id}')">+ 添加店铺</button>`;

    let noteH='';
    if(it.note)noteH=`<div class="g-note"><div class="note-saved">"${it.note}"</div><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">✏️编辑</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')">${it.note}</textarea></div>`;
    else noteH=`<div class="g-note"><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">💭写感受</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')"></textarea></div>`;

    return`<div class="group"><div class="group-head" onclick="togGrp(this)"><span class="g-exp ${autoOpen?'open':''}">▸</span><div class="g-dot ${it.cat}"></div><div class="g-title ${done?'done-t':''}">${it.title}<span class="g-count-label"> · ${it.shops.length}家</span></div><div class="g-tags">${tags}</div><div class="g-actions">${right}</div></div><div class="shops-wrap ${autoOpen?'open':''}">${sc}${showAllBtn}${addBtn}${noteH}</div></div>`;
  }

  let h='';
  if(kidsArea){
    // Split nearby (<3km) vs far
    const nearUn=un.filter(i=>closestShopDist(i,kidsArea)<3);
    const farUn=un.filter(i=>closestShopDist(i,kidsArea)>=3);
    const nearWalk=nearUn.filter(i=>!i.appt);
    const nearAppt=nearUn.filter(i=>i.appt);
    if(nearWalk.length)h+=`<div class="sec-label">⚡ 3km内 · 随时去</div>${nearWalk.map(i=>rg(i,true)).join('')}`;
    if(nearAppt.length)h+=`<div class="sec-label">📍 3km内 · 需预约</div>${nearAppt.map(i=>rg(i,true)).join('')}`;
    const farWalk=farUn.filter(i=>!i.appt);
    const farAppt=farUn.filter(i=>i.appt);
    if(farWalk.length)h+=`<div class="sec-label">🚶 更远 · 随时去</div>${farWalk.map(i=>rg(i,false)).join('')}`;
    if(farAppt.length)h+=`<div class="sec-label">🔖 更远 · 需预约</div>${farAppt.map(i=>rg(i,false)).join('')}`;
  }else{if(un.length)h+=`<div class="sec-label">待打卡</div>${un.map(i=>rg(i,false)).join('')}`}
  if(dn.length)h+=`<div class="sec-label">已完成 ✨</div>${dn.map(i=>rg(i,false)).join('')}`;
  el.innerHTML=h;updateE();
}

// Interactions
function togGrp(head){head.querySelector('.g-exp').classList.toggle('open');head.nextElementSibling.classList.toggle('open')}
function showAllShops(btn){
  const wrap=btn.parentElement;
  wrap.querySelectorAll('[data-extra]').forEach(el=>el.style.display='');
  btn.remove();
}
function togShop(id,idx){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].done=!it.shops[idx].done;save();render()}}
function chgCnt(id,d){const it=items.find(i=>i.id===id);if(it){it.count=Math.max(0,Math.min(it.target,it.count+d));save();render()}}
function togGuide(btn){btn.classList.toggle('open');const g=btn.nextElementSibling;g.classList.toggle('show');if(g.classList.contains('show')){const t=g.querySelector('textarea');if(t)t.focus()}}
function saveG(id,idx,ta){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].guide=ta.value.trim();save()}}
function openN(id){const t=document.getElementById('n-'+id);t.classList.toggle('show');if(t.classList.contains('show'))t.focus()}
function saveN(id){const t=document.getElementById('n-'+id);const it=items.find(i=>i.id===id);if(it){it.note=t.value.trim();save();setTimeout(()=>render(),100)}}

// === PANEL (Add/Edit Shop) ===
let panelMode='add',panelItemId='',panelShopIdx=-1;

function populateAreaDatalist(){
  const dl=document.getElementById('areaList');
  const areas=allAreas();
  dl.innerHTML=areas.map(a=>`<option value="${a}">`).join('');
}

function openAdd(itemId){
  panelMode='add';panelItemId=itemId;panelShopIdx=-1;
  document.getElementById('panelTitle').textContent='添加店铺';
  document.getElementById('pName').value='';
  document.getElementById('pArea').value='';
  document.getElementById('pDzdp').value='';
  document.getElementById('pXhs').value='';
  document.getElementById('pNote').value='';
  document.getElementById('pDel').style.display='none';
  populateAreaDatalist();
  showPanel();
}

function openEdit(itemId,shopIdx){
  panelMode='edit';panelItemId=itemId;panelShopIdx=shopIdx;
  const it=items.find(i=>i.id===itemId);
  if(!it||!it.shops[shopIdx])return;
  const s=it.shops[shopIdx];
  document.getElementById('panelTitle').textContent='编辑店铺';
  document.getElementById('pName').value=s.name||'';
  document.getElementById('pArea').value=s.area||'';
  document.getElementById('pDzdp').value=s.url||'';
  document.getElementById('pXhs').value=s.xhs||'';
  document.getElementById('pNote').value=s.note||'';
  document.getElementById('pDel').style.display='block';
  populateAreaDatalist();
  showPanel();
}

function showPanel(){
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('pName').focus(),300);
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.body.style.overflow='';
}

function savePanel(){
  const name=document.getElementById('pName').value.trim();
  if(!name){document.getElementById('pName').style.borderColor='#d44';return}
  const area=document.getElementById('pArea').value.trim()||'待定';
  const url=document.getElementById('pDzdp').value.trim();
  const xhs=document.getElementById('pXhs').value.trim();
  const note=document.getElementById('pNote').value.trim();

  const it=items.find(i=>i.id===panelItemId);
  if(!it)return;

  if(panelMode==='add'){
    it.shops.push({name,area,url,xhs,note,guide:'',done:false});
  }else{
    const s=it.shops[panelShopIdx];
    if(s){s.name=name;s.area=area;s.url=url;s.xhs=xhs;s.note=note}
  }
  save();closePanel();buildChips();render();
}

function delShop(){
  if(!confirm('确定删除这家店铺？'))return;
  const it=items.find(i=>i.id===panelItemId);
  if(it&&it.shops[panelShopIdx]!==undefined){
    it.shops.splice(panelShopIdx,1);
    if(it.shops.length===0)it.shops.push({name:'待找店',area:'待定',url:'',xhs:'',note:'',guide:'',done:false});
    save();closePanel();buildChips();render();
  }
}

// === FILTER EVENTS ===
document.getElementById('areaFilters').addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;areaFilter=c.dataset.area;buildChips();render()});
document.getElementById('kidsAct').addEventListener('change',e=>{kidsArea=e.target.value||'';render()});

buildChips();renderTmrw();render();
</script>
