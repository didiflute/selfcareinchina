<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Recharge">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#e8725c">
<title>Recharge 自我充电</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Background - warm beige from Demo B */
  --bg:#f5f1eb;--bg-warm:#efe8dd;
  --card-bg:#fff;--card-border:rgba(0,0,0,.06);--card-shadow:0 1px 4px rgba(0,0,0,.03),0 4px 14px rgba(0,0,0,.03);
  --line:rgba(0,0,0,0.06);
  /* Brand - softer terra cotta */
  --coral:#d8856a;--coral-soft:rgba(216,133,106,.10);--coral-glow:rgba(216,133,106,.20);
  --amber:#c08a55;--amber-soft:rgba(192,138,85,.10);
  /* Category - desaturated vintage */
  --sage:#8a9a7e;--sage-soft:rgba(138,154,126,.10);
  --plum:#9d8aab;--plum-soft:rgba(157,138,171,.10);
  --sky:#7e9aaf;--sky-soft:rgba(126,154,175,.10);
  --orange:#c08a55;--orange-soft:rgba(192,138,85,.10);
  /* Text - warm browns */
  --text:#2a2622;--text-mid:#4a4540;--text-dim:#7a736d;--text-light:#a39b94;
  --done-bg:#f0ede5;--done-text:#a39b94;
  /* Radius - smaller, more editorial */
  --r-lg:12px; --r-md:8px; --r-sm:4px;
  /* Spacing 8px system */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px; --s-6:32px;
  /* Legacy aliases */
  --radius:var(--r-md);--radius-sm:var(--r-sm);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Serif SC',serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:120px;overflow-x:hidden;font-weight:400}

.header{padding:48px 24px 20px;position:relative;overflow:hidden;background:transparent;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:flex-end;gap:14px;position:relative}
.brand-icon{width:42px;height:42px;background:linear-gradient(135deg,#e89478,var(--coral));border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(216,133,106,.20)}
.brand-text{display:flex;flex-direction:column;gap:2px}
.brand h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:400;letter-spacing:-0.5px;color:var(--text);line-height:1}
.brand h1 em{font-style:italic;color:var(--coral);font-weight:500}
.brand-zh{font-family:'Noto Serif SC',serif;font-size:12px;color:var(--text-dim);letter-spacing:3px;font-weight:400;margin-top:2px}
.day-counter{font-family:'Inter',sans-serif;font-size:10px;color:var(--coral);margin-top:6px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500}
.header .sub{display:none}

.energy{margin:0;background:transparent;padding:var(--s-2) var(--s-5) var(--s-3)}
.energy-card{background:rgba(255,255,255,0.85);border-radius:var(--r-md);padding:var(--s-4);position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.energy-card::after{content:'⚡';position:absolute;right:14px;top:12px;font-size:28px;opacity:.06}
.energy-main{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--s-2)}
.energy-label{font-size:12px;color:var(--text-light);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.energy-pct{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--text-mid);font-weight:400}
.energy-pct small{font-family:'Noto Sans SC';font-size:13px;font-weight:400;color:var(--text-light)}
.bar-track{height:6px;background:rgba(0,0,0,0.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.25,1,.5,1);position:relative}
.bar-fill.main{background:linear-gradient(90deg,var(--coral),#f0a48a)}
.bar-fill.main::after{content:'';position:absolute;right:0;top:0;bottom:0;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4));border-radius:0 3px 3px 0}
.dims{display:grid;grid-template-columns:1fr 1fr;gap:var(--s-2) var(--s-3);margin-top:var(--s-3)}
.dim{display:flex;flex-direction:column;gap:4px}
.dim-top{display:flex;justify-content:space-between;align-items:center}
.dim-label{font-size:13px;color:var(--text-dim);font-weight:500}
.dim-pct{font-size:13px;font-weight:600}
.dim-pct.body{color:var(--sage)}.dim-pct.look{color:var(--coral)}.dim-pct.exp{color:var(--plum)}.dim-pct.kids{color:var(--sky)}.dim-pct.food{color:var(--orange)}
.dim-bar{height:5px;background:var(--bg-warm);border-radius:3px;overflow:hidden}
.dim-fill{height:100%;border-radius:3px;transition:width .5s ease}
.dim-fill.body{background:var(--sage)}.dim-fill.look{background:var(--coral)}.dim-fill.exp{background:var(--plum)}.dim-fill.kids{background:var(--sky)}.dim-fill.food{background:var(--orange)}

.tomorrow{margin:0 24px 12px;background:linear-gradient(135deg,rgba(255,248,240,0.85),rgba(255,245,235,0.85));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(232,114,92,.12);border-radius:var(--radius);padding:14px 16px;display:none}
.tomorrow.has-items{display:block}
.tomorrow-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tomorrow-title{font-size:14px;font-weight:600;color:var(--coral)}
.tomorrow-clear{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit}
.tomorrow-items{display:flex;flex-direction:column;gap:4px}
.tomorrow-item{display:flex;align-items:center;gap:8px;font-size:14px;padding:8px 12px;background:white;border-radius:8px;border:1px solid rgba(0,0,0,.04)}
.t-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.t-dot.body{background:var(--sage)}.t-dot.look{background:var(--coral)}.t-dot.exp{background:var(--plum)}.t-dot.kids{background:var(--sky)}.t-dot.food{background:var(--orange)}
.t-name{flex:1;color:var(--text-mid)}.t-remove{font-size:14px;color:var(--text-light);background:none;border:none;cursor:pointer;padding:0 2px}

.kids-bar{margin:0 24px 12px;background:rgba(212,148,58,0.08);border:1px solid rgba(212,148,58,.15);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-mid)}
.kids-bar select{background:white;border:1px solid rgba(212,148,58,.25);color:var(--amber);border-radius:6px;padding:6px 10px;font-size:14px;font-family:inherit;font-weight:500;outline:none;max-width:200px}
.kids-bar .hint{color:var(--amber);opacity:.7;font-size:12px;margin-left:auto}

.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:var(--s-1)}
.tab{flex:0 0 auto;padding:8px 14px;font-size:13px;font-weight:500;text-align:center;color:var(--text-dim);cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap;transition:all .2s;border-radius:var(--r-md)}
.tab.active{background:var(--text-mid);color:white}

.filters{padding:0 var(--s-5) var(--s-2);display:flex;flex-direction:column;gap:var(--s-2)}
.filter-row-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.filter-row{display:flex;gap:var(--s-1);flex-wrap:wrap;margin-top:var(--s-1)}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--card-border);background:rgba(255,255,255,0.88);color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:active{transform:scale(.95)}
.chip.a-all{background:var(--bg-warm);border-color:var(--text-light);color:var(--text-mid)}
.chip.a-area{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}

/* Area dropdown */
.area-select{background:white;border:1.5px solid var(--card-border);color:var(--text-mid);border-radius:10px;padding:8px 14px;font-size:14px;font-family:inherit;font-weight:500;outline:none;width:100%;max-width:300px;appearance:auto}
.area-select:focus{border-color:var(--amber)}

.sec-label{padding:16px 24px 6px;font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}

/* PROJECT CARD - editorial */
.group{margin:0 var(--s-5) var(--s-2);animation:fadeUp .25s ease both;background:white;border-radius:var(--r-md);box-shadow:none;border:1px solid var(--line);overflow:hidden}
.group.done-group{background:var(--done-bg);box-shadow:none;border-color:transparent;opacity:.7}
.group-head{display:flex;align-items:center;gap:var(--s-2);padding:var(--s-3) var(--s-4);cursor:pointer}
.g-exp{font-size:11px;color:var(--text-light);transition:transform .2s;display:inline-block}
.g-exp.open{transform:rotate(90deg)}
.g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.g-dot.body{background:var(--sage)}.g-dot.look{background:var(--coral)}.g-dot.exp{background:var(--plum)}.g-dot.kids{background:var(--sky)}.g-dot.food{background:var(--orange)}
.g-title{font-family:'Noto Serif SC';font-size:15px;font-weight:500;color:var(--text);flex:1}
.g-title.done-t{color:var(--done-text);text-decoration:line-through}
.g-count-label{font-family:'Inter',sans-serif;font-size:11px;color:var(--text-light);font-weight:400;letter-spacing:0.5px}
.g-actions{display:flex;align-items:center;gap:var(--s-1)}
.g-plan-btn{width:28px;height:28px;border-radius:var(--r-sm);border:1px solid var(--text-light);background:none;color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.g-plan-btn:active{transform:scale(.9)}
.g-plan-btn.planned{background:var(--coral);border-color:var(--coral);color:white}
.g-counter{display:flex;align-items:center;gap:2px}
.cnt-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--text-light);background:none;color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cnt-btn:active{transform:scale(.88)}
.cnt-num{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;min-width:36px;text-align:center;color:var(--text-mid)}

/* SHOPS WRAP (inside card) */
.shops-wrap{display:none;padding:var(--s-3) var(--s-4) var(--s-3);flex-direction:column;gap:var(--s-2);background:rgba(0,0,0,0.012);border-top:1px solid var(--line)}
.shops-wrap.open{display:flex}

/* SHOP SUB-CARD */
.sub-card{background:white;border-radius:var(--r-sm);padding:var(--s-3);border:1px solid var(--line);transition:all .2s}
.sub-card.done-c{background:var(--done-bg);border-color:transparent}
.sub-card.done-c .s-name{color:var(--done-text);text-decoration:line-through}
.tag{font-family:'Inter',sans-serif;font-size:9px;padding:3px 8px;border-radius:var(--r-sm);font-weight:500;text-transform:uppercase;letter-spacing:1.2px}
.tag-appt{background:transparent;color:var(--sage);border:1px solid var(--sage)}
.tag-date{background:var(--plum-soft);color:var(--plum);border:1px solid transparent}
.tag-walk{background:transparent;color:var(--text-light);border:1px solid var(--line)}
.tag-nearby{background:var(--coral);color:white;border:1px solid var(--coral);font-weight:600}
.sub-card.nearby-highlight{border-color:var(--coral);border-width:1.5px;background:var(--coral-soft)}
.sub-top{display:flex;align-items:center;gap:10px}
.sub-info{flex:1;min-width:0}
.s-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.s-name{font-size:15px;font-weight:500}
.s-name a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--text-light)}
.s-area{font-family:'Inter',sans-serif;font-size:10px;padding:2px 7px;border-radius:var(--r-sm);background:transparent;color:var(--text-light);font-weight:500;text-transform:uppercase;letter-spacing:0.8px;border:1px solid var(--line)}
.s-note{font-size:13px;color:var(--text-dim);margin-top:3px;font-style:italic}
.s-check{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--text-light);background:none;color:var(--text-light);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.s-check:active{transform:scale(.9)}
.s-check.checked{background:var(--sage);border-color:var(--sage);color:white}

.s-expand-btn{font-family:'Inter',sans-serif;font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;margin-top:6px;padding:2px 0;display:flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:1px;font-weight:500}
.s-expand-btn .arr{font-size:10px;display:inline-block;transition:transform .2s}
.s-expand-btn.open .arr{transform:rotate(90deg)}
.s-guide{display:none;margin-top:6px}
.s-guide.show{display:block}
.s-guide textarea{width:100%;background:white;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;color:var(--text);font-family:'Noto Serif SC';resize:vertical;outline:none;min-height:50px;line-height:1.7}
.s-guide textarea:focus{border-color:var(--text-light)}
.s-guide-saved{font-size:14px;color:var(--text-mid);line-height:1.8;white-space:pre-wrap;padding:4px 0;font-family:'Noto Serif SC'}

.g-note{margin:0;padding:10px 0 0;border-top:1px solid var(--line)}
.note-toggle{font-family:'Inter',sans-serif;font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:3px 0;text-transform:uppercase;letter-spacing:1px;font-weight:500}
.note-input{width:100%;margin-top:4px;background:white;border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;color:var(--text);font-family:'Noto Serif SC';resize:none;outline:none;display:none}
.note-input:focus{border-color:var(--text-light)}
.note-input.show{display:block}
.note-saved{font-size:14px;color:var(--text-dim);margin-top:3px;font-style:italic;font-family:'Playfair Display',serif}

/* NAV BUTTON */
.s-nav{display:inline-flex;align-items:center;gap:3px;font-family:'Inter',sans-serif;font-size:10px;padding:4px 10px;border-radius:var(--r-sm);background:var(--text-mid);color:white;text-decoration:none;font-weight:500;text-transform:uppercase;letter-spacing:0.8px}

.empty{text-align:center;padding:40px 20px;color:var(--text-dim)}
.empty .emoji{font-size:32px;margin-bottom:10px}
.empty p{font-size:13px;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SHOP LINKS ROW */
.s-links{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.s-link{font-family:'Inter',sans-serif;font-size:10px;padding:4px 10px;border-radius:var(--r-sm);text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.s-link.dzdp{background:transparent;color:#ff6633;border:1px solid #ff6633}
.s-link.xhs{background:transparent;color:#fe2c55;border:1px solid #fe2c55}
.s-link-edit{font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 2px;margin-left:2px}

/* ADD SHOP BTN */
.add-shop-btn{width:100%;padding:10px;border:1px dashed var(--text-light);border-radius:var(--r-sm);background:none;color:var(--text-light);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;margin-top:2px;text-transform:uppercase;letter-spacing:1px;font-weight:500}
.add-shop-btn:active{transform:scale(.98);border-color:var(--coral);color:var(--coral)}

/* PANEL OVERLAY */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;opacity:0;transition:opacity .25s}
.panel-overlay.show{display:block;opacity:1}

/* BOTTOM PANEL */
.panel{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.25,1,.5,1);max-height:85vh;overflow-y:auto;padding:20px 24px 36px;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.panel.show{transform:translateY(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.panel-title{font-size:16px;font-weight:600}
.panel-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-warm);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.panel-field{margin-bottom:14px}
.panel-label{font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:4px;display:block}
.panel-input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none}
.panel-input:focus{border-color:var(--coral)}
.panel-input::placeholder{color:var(--text-light)}
.panel-select{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;appearance:none}
.panel-row{display:flex;gap:10px}
.panel-row .panel-field{flex:1}
.panel-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.panel-btn{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.panel-btn:active{transform:scale(.97)}
.panel-btn.primary{background:var(--coral);color:white}
.panel-btn.secondary{background:var(--bg-warm);color:var(--text-mid)}
.panel-btn.danger{background:rgba(221,68,68,0.08);color:#d44;font-size:13px;font-weight:600;padding:10px 14px;flex:1 1 100%;border:1.5px solid rgba(221,68,68,0.25);border-radius:var(--radius-sm);text-align:center;order:3}

/* Item panel cat buttons */
.panel-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.panel-cat-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;border:1.5px solid var(--card-border);background:var(--bg);color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s}
.panel-cat-btn:active{transform:scale(.95)}
.panel-cat-btn.sel-body{background:var(--sage-soft);border-color:var(--sage);color:var(--sage)}
.panel-cat-btn.sel-look{background:var(--coral-soft);border-color:var(--coral);color:var(--coral)}
.panel-cat-btn.sel-exp{background:var(--plum-soft);border-color:var(--plum);color:var(--plum)}
.panel-cat-btn.sel-kids{background:var(--sky-soft);border-color:var(--sky);color:var(--sky)}
.panel-cat-btn.sel-food{background:var(--orange-soft);border-color:var(--orange);color:var(--orange)}

/* Add item button */
.add-item-btn{margin:16px 24px;padding:16px;border:1.5px dashed var(--text-dim);border-radius:var(--radius);background:rgba(255,255,255,0.6);color:var(--text-dim);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;width:calc(100% - 48px)}
.add-item-btn:active{transform:scale(.98);border-color:var(--coral);color:var(--coral)}

/* Search bar */
.search-bar{margin:var(--s-3) var(--s-5) 0;position:relative}
.search-input{width:100%;padding:10px var(--s-3) 10px 36px;border:1px solid var(--line);border-radius:var(--r-sm);background:white;font-size:13px;font-family:'Noto Serif SC';color:var(--text);outline:none;box-sizing:border-box;transition:all .2s}
.search-input:focus{border-color:var(--text-light);background:white;box-shadow:0 0 0 3px rgba(216,133,106,.06)}
.search-input::placeholder{color:var(--text-light)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-light);pointer-events:none;opacity:.6}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:14px;color:var(--text-light);cursor:pointer;padding:4px;display:none}
.search-clear.show{display:block}

/* Appointment date */
.g-date-btn{font-family:'Inter',sans-serif;font-size:10px;padding:4px 10px;border-radius:var(--r-sm);border:1px dashed var(--text-light);background:transparent;color:var(--text-light);cursor:pointer;font-weight:500;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;transition:all .15s}
.g-date-btn:active{transform:scale(.95)}
.g-date-btn.has-date{background:var(--text-mid);color:white;border:1px solid var(--text-mid);font-weight:500}

  {id:'cwtl',title:'川外小铁路徒步',cat:'kids',appt:false,type:'check',shops:[{name:'川外小铁路',area:'沙坪坝',addr:'梅林停车场',url:'',xhs:'',note:'免费 · 1号线烈士墓站2B口步行15min · 全程2km平坦',guide:'【川外小铁路 · 森系徒步路线】\n重庆市区内户外轻徒步宝藏地！不用出市区就能开启户外治愈之旅\n\n【交通】\n🚇 1号线烈士墓站2B口出站，步行约15分钟\n（觉得步行累也可以出站后坐公交车）\n🚗 自驾导航"梅林停车场"，停车后步行几分钟到入口\n⚠️ 停车提醒：工作日好停，周末不好停！评论区多人建议别开车\n\n【路线info】\n✅ 全程约2km，大半个小时就走完\n✅ 路况很好，基本是平坦道路\n✅ 对徒步小白超友好，老人小孩都能走～\n\n【三大亮点】\n1️⃣ 秋日森系氛围拉满：阳光透过枝叶缝隙洒下斑驳光影，满满森系氛围感🌿\n2️⃣ 复古小铁路：废弃的铁轨诉说着往昔的故事，仿佛能看到曾经列车穿梭的画面，拍照出片随意拿捏📸\n3️⃣ 神秘时光隧道：300多米长的隧道，充满了神秘浪漫\n\n💡 如果不尽兴，可以返回沿着铁轨一直走到梨树湾\n🎒 自己带点干粮和水，随时补充体力\n🚻 公卫较少要注意',myNotes:'',done:false}],note:'',pts:15},

// Map any area name to its life zone
function getZone(area){
  if(!area||area==='待定')return null;
  for(const[zn,z]of Object.entries(LIFE_ZONES)){
    if(z.areas.some(a=>area.includes(a)||a.includes(area)))return zn;
  }
  return null;
}

// Get coord for any area (via life zone center)
function getCoord(area){
  if(!area||area==='待定')return null;
  const zone=getZone(area);
  if(zone)return LIFE_ZONES[zone].coord;
  return null;
}

// Get life zone for an item (from its shops)
function getItemZones(it){
  const zones=new Set();
  it.shops.forEach(s=>{const z=getZone(s.area);if(z)zones.add(z)});
  return[...zones];
}

// Get life zone for a food item (parse address from foodGuide)
function getFoodZone(it){
  if(it.foodGuide){
    for(const[zn,z]of Object.entries(LIFE_ZONES)){
      if(z.areas.some(a=>it.foodGuide.includes(a)))return zn;
    }
  }
  return null;
}
function distKm(a,b){
  if(!a||!b)return 999;
  const R=6371,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function shopDist(shop,targetArea){
  const tc=getCoord(targetArea),sc=getCoord(shop.area);
  return distKm(tc,sc);
}
function closestShopDist(item,targetArea){
  if(!targetArea)return 999;
  return Math.min(...item.shops.map(s=>shopDist(s,targetArea)));
}

  const merged=ITEMS.map(def=>{const sv=p.find(x=>x.id===def.id);if(!sv)return cp(def);const ms=def.shops.map((d,i)=>{const ss=sv.shops&&sv.shops[i];return ss?{...d,...ss}:{...d}});if(sv.shops&&sv.shops.length>def.shops.length)for(let i=def.shops.length;i<sv.shops.length;i++)ms.push(sv.shops[i]);return{...def,...sv,shops:ms}});
  // Also add any custom items not in ITEMS
  p.forEach(sv=>{if(!ITEMS.find(d=>d.id===sv.id))merged.push({...sv,shops:(sv.shops||[]).map(s=>({...s}))})});
  return merged;
}}catch(e){}return ITEMS.map(cp)}

function isDone(it){
  if(it.cat==='food')return it.done||false;

  return it.count>=it.target;
}

// Energy
function calcE(){
  const c={body:{d:0,t:0},look:{d:0,t:0},exp:{d:0,t:0},kids:{d:0,t:0},food:{d:0,t:0}};
  let tE=0,tP=0;
  items.forEach(it=>{const cat=c[it.cat];if(!cat)return;const p=it.pts||8;
    if(it.type==='counter'){const f=it.target>0?it.count/it.target:0;cat.d+=p*f;cat.t+=p;tE+=p*f}
    else{const d=isDone(it);cat.d+=d?p:0;cat.t+=p;tE+=d?p:0}
    tP+=p;});
  return{c,tE,tP};
}
function updateE(){
  const e=calcE();const tp=e.tP>0?Math.round(e.tE/e.tP*100):0;
  document.getElementById('totalPct').innerHTML=`${tp}<small>%</small>`;
  document.getElementById('totalBar').style.width=tp+'%';
  ['body','look','exp','kids','food'].forEach(k=>{
    const v=e.c[k];const p=v.t>0?Math.round(v.d/v.t*100):0;
    const C=k[0].toUpperCase()+k.slice(1);
    document.getElementById('dim'+C).textContent=p+'%';
    document.getElementById('bar'+C).style.width=p+'%';
  });
  // Update collapsed bar
  const totalDone=items.filter(i=>isDone(i)).length;
  const totalItems=items.length;
  document.getElementById('ecCount').innerHTML=`${totalDone}<small>/${totalItems}</small>`;
  // Mini bars: 5 cells per category, fill = completion ratio
  const cats=[
    {k:'body',e:'💪'},
    {k:'look',e:'✨'},
    {k:'exp',e:'🎭'},
    {k:'kids',e:'👦'},
    {k:'food',e:'🍜'}
  ];
  let mb='';
  cats.forEach(c=>{
    const total=items.filter(i=>i.cat===c.k).length;
    const done=items.filter(i=>i.cat===c.k&&isDone(i)).length;
    const ratio=total>0?done/total:0;
    const cells=5;
    const filled=Math.round(ratio*cells);
    mb+=`<div class="ec-mini"><span class="ec-mini-emoji">${c.e}</span>`;
    for(let i=0;i<cells;i++){
      mb+=`<div class="ec-mini-cell ${c.k} ${i<filled?'fill':''}"></div>`;
    }

// Today widget
function renderToday(){
  const w=document.getElementById('todayWidget');
  const today=new Date();
  const todayWd=today.getDay();
  const pad=n=>String(n).padStart(2,'0');
  const ymd=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  const todayAppts=[];
  // Helper: does an appt apply today?
  function applyTo(appt){
    if(appt.apptDate===ymd)return true;
    if(appt.apptWeekdays&&appt.apptWeekdays.length&&appt.apptWeekdays.includes(todayWd)){
      // Repeat applies only from start date forward
      if(appt.apptDate){
        const start=new Date(appt.apptDate+'T00:00:00');
        const t=new Date(today);t.setHours(0,0,0,0);
        return t>=start;
      }
      return true;
    }
    return false;
  }
  items.forEach(it=>{
    const isFood=it.cat==='food';
    if(isFood){
      if(applyTo(it)){
        const checkedDates=it.checkedDates||{};
        todayAppts.push({title:it.title,subtitle:'',cat:it.cat,id:it.id,shopIdx:-1,time:it.apptTime||'',done:!!checkedDates[ymd],isRepeat:!!(it.apptWeekdays&&it.apptWeekdays.length),ymd});
      }
    }else{
      let hasShopAppt=false;
      it.shops.forEach((s,sIdx)=>{
        if(applyTo(s)){
          hasShopAppt=true;
          const checkedDates=s.checkedDates||{};
          todayAppts.push({title:it.title,subtitle:s.name,cat:it.cat,id:it.id,shopIdx:sIdx,time:s.apptTime||'',done:!!checkedDates[ymd],isRepeat:!!(s.apptWeekdays&&s.apptWeekdays.length),ymd});
        }
      });
      if(applyTo(it)&&!hasShopAppt){
        const checkedDates=it.checkedDates||{};
        todayAppts.push({title:it.title,subtitle:'',cat:it.cat,id:it.id,shopIdx:-1,time:it.apptTime||'',done:!!checkedDates[ymd],isRepeat:!!(it.apptWeekdays&&it.apptWeekdays.length),ymd});
      }
    }
  });
  todayAppts.sort((a,b)=>(a.time||'24:00').localeCompare(b.time||'24:00'));
  if(!todayAppts.length){w.style.display='none';return}
  w.style.display='block';
  const m=today.getMonth()+1,d=today.getDate();
  document.getElementById('twCount').textContent=`— ${m}月${d}日 · ${todayAppts.length} 件事`;
  const list=document.getElementById('twItems');
  list.innerHTML=todayAppts.map(a=>{
    const titleHTML=a.subtitle?`${a.title} · <span style="color:var(--text-light);font-size:13px">${a.subtitle}</span>`:a.title;
    const timeHTML=a.time?`<span style="font-family:'Inter';font-size:11px;color:var(--text-light);background:rgba(0,0,0,0.04);padding:1px 6px;border-radius:3px;margin-right:6px;font-weight:500">${a.time}</span>`:'';
    const repeatHTML=a.isRepeat?`<span style="font-family:'Inter';font-size:10px;color:var(--plum);margin-left:4px;font-weight:600">↻</span>`:'';
    return `<div class="tw-item"><div class="tw-dot" style="background:var(--${a.cat==='body'?'sage':a.cat==='look'?'coral':a.cat==='exp'?'plum':a.cat==='kids'?'sky':'orange'})"></div>${timeHTML}<span class="tw-name ${a.done?'done':''}" onclick="jumpToProject('${a.id}')" style="cursor:pointer">${titleHTML}${repeatHTML}</span><button class="tw-check ${a.done?'checked':''}" onclick="toggleApptDone('${a.id}',${a.shopIdx},'${a.ymd}')">${a.done?'✓':''}</button></div>`;
  }).join('');
}

// Auto-format time input as user types
function formatTimeInput(el){
  let v=el.value.replace(/[^0-9:]/g,'');
  if(v.length>=3&&!v.includes(':')){
    v=v.substring(0,2)+':'+v.substring(2,4);
  }
  if(v.length>5)v=v.substring(0,5);
  el.value=v;
}
function validateTimeInput(el){
  let v=el.value.trim();
  if(!v)return;
  if(!v.includes(':')){
    if(v.length<=2){
      v=v.padStart(2,'0')+':00';
    }
  }else{
    const parts=v.split(':');
    let h=parts[0]||'';
    let m=parts[1]||'00';
    h=h.padStart(2,'0').substring(0,2);
    m=m.padEnd(2,'0').substring(0,2);
    const hn=parseInt(h,10),mn=parseInt(m,10);
    if(isNaN(hn)||hn>23||isNaN(mn)||mn>59){el.value='';return;}
    v=h+':'+m;
  }
  el.value=v;
}

// Calendar - shows only the 16 Chongqing days (June 7-22, 2026)
const TRIP_START='2026-06-08';
const TRIP_END='2026-06-22';
function renderCalendar(){
  const el=document.getElementById('calView');
  if(!el.classList.contains('show'))return;

  const start=new Date(TRIP_START+'T00:00:00');
  const end=new Date(TRIP_END+'T00:00:00');
  const today=new Date();today.setHours(0,0,0,0);
  // Use local YYYY-MM-DD format
  const pad=n=>String(n).padStart(2,'0');
  const todayYMD=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  // Build all days
  const days=[];
  const cur=new Date(start);
  while(cur<=end){
    days.push(new Date(cur));
    cur.setDate(cur.getDate()+1);
  }

  // Get appointments per day - collect from both project-level (food) and shop-level
  // For each day in the trip, check which appointments fall on it (single date OR weekday match)
  const apptsByDay={};
  // Helper: does an appt apply to a given date?
  function applyApptToDate(appt,dateObj,ymd){
    // Single date match
    if(appt.apptDate===ymd)return true;
    // Weekday repeat match (only if weekdays selected)
    if(appt.apptWeekdays&&appt.apptWeekdays.length){
      // Repeat applies from the first set apptDate forward (or all trip days if no apptDate)
      if(appt.apptDate){
        const startDate=new Date(appt.apptDate+'T00:00:00');
        if(dateObj<startDate)return false;
      }
      return appt.apptWeekdays.includes(dateObj.getDay());
    }
    return false;
  }
  
  days.forEach(dateObj=>{
    const ymd=`${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())}`;
    items.forEach(it=>{
      const isFood=it.cat==='food';
      if(isFood){
        if(applyApptToDate(it,dateObj,ymd)){
          if(!apptsByDay[ymd])apptsByDay[ymd]=[];
          const checkedDates=it.checkedDates||{};
          apptsByDay[ymd].push({
            title:it.title,subtitle:'',cat:it.cat,id:it.id,shopIdx:-1,
            time:it.apptTime||'',
            done:!!checkedDates[ymd],
            isRepeat:!!(it.apptWeekdays&&it.apptWeekdays.length),
            ymd:ymd
          });
        }
      }else{
        let hasShopAppt=false;
        it.shops.forEach((s,sIdx)=>{
          if(applyApptToDate(s,dateObj,ymd)){
            hasShopAppt=true;
            if(!apptsByDay[ymd])apptsByDay[ymd]=[];
            const checkedDates=s.checkedDates||{};
            apptsByDay[ymd].push({
              title:it.title,subtitle:s.name,cat:it.cat,id:it.id,shopIdx:sIdx,
              time:s.apptTime||'',
              done:!!checkedDates[ymd],
              isRepeat:!!(s.apptWeekdays&&s.apptWeekdays.length),
              ymd:ymd
            });
          }
        });
        if(applyApptToDate(it,dateObj,ymd)&&!hasShopAppt){
          if(!apptsByDay[ymd])apptsByDay[ymd]=[];
          const checkedDates=it.checkedDates||{};
          apptsByDay[ymd].push({
            title:it.title,subtitle:'',cat:it.cat,id:it.id,shopIdx:-1,
            time:it.apptTime||'',
            done:!!checkedDates[ymd],
            isRepeat:!!(it.apptWeekdays&&it.apptWeekdays.length),
            ymd:ymd
          });
        }
      }
    });
  });
  // Sort each day's appointments by time
  Object.keys(apptsByDay).forEach(k=>{
    apptsByDay[k].sort((a,b)=>(a.time||'24:00').localeCompare(b.time||'24:00'));
  });

  // Header
  let h=`<div class="cal-header"><span class="cal-title">重庆 · 15天</span><span style="font-family:'Inter',sans-serif;font-size:11px;color:var(--text-light);letter-spacing:1px">JUN 8 — JUN 22</span></div>`;

  // Column titles (sticky at top of strip)
  h+=`<div class="cal-col-titles">
    <div class="cal-col-title-spacer"></div>
    <div class="cal-col-title cal-col-title-me">我的</div>
    <div class="cal-col-title cal-col-title-kids">娃的</div>
  </div>`;

  // Day strip - vertical list, each day is a row
  h+=`<div class="cal-strip">`;
  // Holiday markers
  const HOLIDAYS={
    '2026-06-19':'端午节 · 第一天',
    '2026-06-20':'端午节',
    '2026-06-21':'端午节 · 最后一天'
  };
  days.forEach((d,idx)=>{
    const ymd=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const dayNum=d.getDate();
    const dayOfWeek=['日','一','二','三','四','五','六'][d.getDay()];
    const isToday=ymd===todayYMD;
    const isPast=d<today;
    const dayLabel=`Day ${idx+1}`;
    const dayAppts=apptsByDay[ymd]||[];
    const holiday=HOLIDAYS[ymd];
    
    // Split into mine vs kids
    const myAppts=dayAppts.filter(a=>a.cat!=='kids');
    const kidsAppts=dayAppts.filter(a=>a.cat==='kids');
    
    let stateClass='';
    if(isToday)stateClass='today';
    else if(isPast)stateClass='past';
    if(holiday)stateClass+=' holiday';
    
    h+=`<div class="cal-row ${stateClass}">
      <div class="cal-row-date">
        <div class="cal-row-day">${dayNum}</div>
        <div class="cal-row-meta">${dayLabel} · 周${dayOfWeek}${isToday?' · 今天':''}</div>
        ${holiday?`<div class="cal-holiday">🎏 ${holiday}</div>`:''}
      </div>
      <div class="cal-col cal-col-me">
        ${renderApptList(myAppts)}
      </div>
      <div class="cal-col cal-col-kids">
        ${renderApptList(kidsAppts)}
      </div>
    </div>`;
  });
  h+=`</div>`;

  el.innerHTML=h;
}

// Toggle done for a specific date (uses checkedDates map)
function toggleApptDone(id,shopIdx,ymd){
  const it=items.find(i=>i.id===id);
  if(!it)return;
  let target;
  if(shopIdx>=0&&it.shops[shopIdx]){
    target=it.shops[shopIdx];
  }else{
    target=it;
  }
  if(!target.checkedDates)target.checkedDates={};
  if(target.checkedDates[ymd]){
    delete target.checkedDates[ymd];
  }else{
    target.checkedDates[ymd]=true;
  }
  // Also update counter for counter-type items based on number of checked dates
  if(it.type==='counter'&&shopIdx<0){
    it.count=Object.keys(it.checkedDates||{}).length;
  }
  save();renderCalendar();renderToday();render();
}

  const el=document.getElementById('content');
  let f=items.filter(it=>{
    if(catFilter!=='all'&&it.cat!==catFilter)return false;
    if(!matchesSearch(it))return false;
    if(areaFilter!=='all'){
      // Check if any shop belongs to the selected life zone
      const zoneData=LIFE_ZONES[areaFilter];
      if(zoneData){
        const hasMatch=it.shops.some(s=>{
          if(!s.area||s.area==='待定')return false;
          return zoneData.areas.some(a=>s.area.includes(a)||a.includes(s.area));
        });
        // For food items, also check foodGuide text
        const foodMatch=it.cat==='food'&&it.foodGuide&&zoneData.areas.some(a=>it.foodGuide.includes(a));
        if(!hasMatch&&!foodMatch)return false;
      }
    }
    return true;
  });
  if(kidsArea)f=sortProx(f,kidsArea);
  const un=f.filter(i=>!isDone(i)),dn=f.filter(i=>isDone(i));
  if(!f.length){el.innerHTML=`<div class="empty"><div class="emoji">🔍</div><p>没有匹配的项目</p></div>`;updateE();return}

  function rg(it,forceOpen){
    const done=isDone(it),pl=planned.includes(it.id);
    const itemDist=kidsArea?closestShopDist(it,kidsArea):999;
    const isNear=itemDist<3;
    const autoOpen=forceOpen||false;
    let tags='';
    if(kidsArea&&isNear)tags+=`<span class="tag tag-nearby">📍 ${itemDist<0.5?'NEAR':itemDist<1?'<1KM':itemDist.toFixed(1)+'KM'}</span>`;
    if(it.appt)tags+=`<span class="tag tag-appt">RSVP</span>`;
    if(it.eventDate)tags+=`<span class="tag tag-date">📅 ${it.eventDate}</span>`;
    if(!it.appt&&!it.eventDate)tags+=`<span class="tag tag-walk">FREE</span>`;

    // Appointment dates
    // For food items: only project-level apptDate
    // For others: collect all shop apptDates
    const isFood=it.cat==='food';
    let allDates=[];
    let hasRepeat=false;
    if(isFood){
      if(it.apptDate)allDates=[it.apptDate];
      if(it.apptWeekdays&&it.apptWeekdays.length)hasRepeat=true;
    }else{
      // Collect from shops
      it.shops.forEach((s,sIdx)=>{
        if(s.apptDate)allDates.push(s.apptDate);
        if(s.apptWeekdays&&s.apptWeekdays.length)hasRepeat=true;
      });
      // Also include legacy project-level apptDate
      if(it.apptDate&&!allDates.includes(it.apptDate))allDates.push(it.apptDate);
      if(it.apptWeekdays&&it.apptWeekdays.length)hasRepeat=true;
    }
    allDates.sort();
    
    let apptLabel='+ DATE';
    if(hasRepeat&&allDates.length===0){
      apptLabel='↻ 每周';
    }else if(hasRepeat&&allDates.length>=1){
      const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const d=new Date(allDates[0]+'T00:00:00');
      apptLabel=`↻ ${months[d.getMonth()]} ${d.getDate()}`;
    }else if(allDates.length===1){
      const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const d=new Date(allDates[0]+'T00:00:00');
      apptLabel=`${months[d.getMonth()]} ${d.getDate()}`;
    }else if(allDates.length>1){
      apptLabel=`📅 ${allDates.length}个`;
    }
    const hasAny=allDates.length>0||hasRepeat;
    const dateBtn=`<button class="g-date-btn ${hasAny?'has-date':''}" onclick="event.stopPropagation();${isFood?`openDatePicker('${it.id}')`:`openDatePickerProj('${it.id}')`}">${apptLabel}</button>`;

    let right=dateBtn;
    // Food items: direct check on item level
    if(it.cat==='food'&&it.type==='check'){
      right=`<button class="s-check ${done?'checked':''}" onclick="event.stopPropagation();togFood('${it.id}')" style="width:32px;height:32px">${done?'✓':''}</button>`+right;
    }
    if(it.type==='counter')right=`<div class="g-counter"><button class="cnt-btn" onclick="event.stopPropagation();chgCnt('${it.id}',-1)">−</button><span class="cnt-num">${it.count}/${it.target}</span><button class="cnt-btn" onclick="event.stopPropagation();chgCnt('${it.id}',1)">+</button></div>`+right;

    // Sort shops by distance when kidsArea active
    let sortedShops=[...it.shops];
    if(kidsArea){sortedShops.sort((a,b)=>shopDist(a,kidsArea)-shopDist(b,kidsArea))}

    // When kidsArea: show only closest shop, rest hidden behind "show all"
    const showOnlyClosest = kidsArea && sortedShops.length > 1;

    const sc=sortedShops.map((s,sortIdx)=>{
      const idx=it.shops.indexOf(s);
      const sd=s.done||false;
      const sn=s.note?`<div class="s-note">${s.note}</div>`:'';
      const hg=s.guide&&s.guide.trim();
      const dist=kidsArea?shopDist(s,kidsArea):999;
      const isClose=dist<3;
      const hasCoords=dist<900;
      const distLabel=kidsArea&&hasCoords?`<span style="font-size:11px;color:${isClose?'var(--sage)':'var(--text-dim)'};margin-left:4px">${dist<0.5?'很近':dist<1?'<1km':dist.toFixed(1)+'km'}</span>`:'';
      // Links row with nav
      let links='<div class="s-links">';
      // Baidu map nav
      const navQuery=s.addr||s.name;
      links+=`<a class="s-nav" href="baidumap://map/place/search?query=${encodeURIComponent(navQuery)}&region=重庆">🗺 导航</a>`;
      if(s.url){const dzdpSearch='dianping://searchshoplist?keyword='+encodeURIComponent(s.name);links+=`<a class="s-link dzdp" href="${dzdpSearch}">📍 大众点评</a>`}
      if(s.xhs)links+=`<a class="s-link xhs" href="${s.xhs}">📕 小红书</a>`;
      links+='</div>';
      let ck='';if(it.type==='check')ck=`<button class="s-check ${sd?'checked':''}" onclick="event.stopPropagation();togShop('${it.id}',${idx})">${sd?'✓':''}</button>`;
      const hidden=showOnlyClosest&&sortIdx>0?'style="display:none" data-extra="1"':'';
      const mn=s.myNotes||'';
      let guideSection='';
      if(hg){
        const guideText=s.guide.replace(/\\n/g,'\n');
        const lines=guideText.split('\n');
        const firstLine=lines[0]||'';
        const rest=lines.slice(1).join('\n');
        if(firstLine.startsWith('🏷')){
          const dealName=firstLine.replace('🏷 团购搜：','').replace('🏷','');
          guideSection=`<div style="background:linear-gradient(135deg,#fff3ed,#fff8f0);border:1.5px dashed var(--coral);border-radius:10px;padding:10px 12px;margin-bottom:10px;position:relative;overflow:hidden">
            <div style="font-size:11px;color:var(--coral);font-weight:600;letter-spacing:1px;margin-bottom:4px">📋 大众点评搜索以下团购名称</div>
            <div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.4;padding:6px 8px;background:white;border-radius:6px;border:1px solid rgba(0,0,0,.06)">${dealName}</div>
          </div><div class="s-guide-saved">${rest}</div>`;
        }else{
          guideSection=`<div class="s-guide-saved">${guideText}</div>`;
        }
      }
      const notesSection=`<div style="margin-top:${hg?'8':'0'}px"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">${hg?'✏️ 我的笔记：':''}  </div><textarea placeholder="写你自己的笔记…" onblur="saveNotes('${it.id}',${idx},this)">${mn}</textarea></div>`;
      // Shop date button
      const sApptDate=s.apptDate||'';
      const sHasRepeat=s.apptWeekdays&&s.apptWeekdays.length>0;
      let sApptLabel='+📅';
      if(sHasRepeat&&!sApptDate){
        sApptLabel='↻ 每周';
      }else if(sHasRepeat&&sApptDate){
        const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        const d=new Date(sApptDate+'T00:00:00');
        sApptLabel=`↻ ${months[d.getMonth()]} ${d.getDate()}`;
      }else if(sApptDate){
        const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        const d=new Date(sApptDate+'T00:00:00');
        sApptLabel=`${months[d.getMonth()]} ${d.getDate()}`;
      }
      const sHasAny=sApptDate||sHasRepeat;
      const sDateBtn=`<button class="g-date-btn ${sHasAny?'has-date':''}" onclick="event.stopPropagation();openShopDate('${it.id}',${idx})" style="font-size:9px;padding:3px 7px">${sApptLabel}</button>`;
      return`<div class="sub-card ${sd?'done-c':''} ${isClose?'nearby-highlight':''}" ${hidden}><div class="sub-top"><div class="sub-info"><div class="s-name-row"><span class="s-name">${s.name}</span><span class="s-area">${s.area}</span>${distLabel}${sDateBtn}<button class="s-link-edit" onclick="event.stopPropagation();openEdit('${it.id}',${idx})">✏️</button></div>${sn}${links}</div>${ck}</div><button class="s-expand-btn" onclick="event.stopPropagation();togGuide(this)"><span class="arr">▸</span>${hg?'📝攻略/笔记':'📝写笔记'}</button><div class="s-guide">${guideSection}${notesSection}</div></div>`;
    }).join('');

    const showAllBtn=showOnlyClosest?`<button class="add-shop-btn" style="border-style:solid;font-size:11px;padding:8px" onclick="event.stopPropagation();showAllShops(this)">查看全部 ${sortedShops.length} 家 ▾</button>`:'';
    const addBtn=`<button class="add-shop-btn" onclick="event.stopPropagation();openAdd('${it.id}')">+ 添加店铺</button>`;
    const editBtn=`<button class="add-shop-btn" style="font-size:12px;padding:8px;margin-top:4px;border-style:solid;color:var(--text-light);border-color:var(--card-border)" onclick="event.stopPropagation();openEditItem('${it.id}')">⚙️ 编辑项目</button>`;

    let noteH='';
    if(it.note)noteH=`<div class="g-note"><div class="note-saved">"${it.note}"</div><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">✏️编辑</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')">${it.note}</textarea></div>`;
    else noteH=`<div class="g-note"><button class="note-toggle" onclick="event.stopPropagation();openN('${it.id}')">💭写感受</button><textarea class="note-input" id="n-${it.id}" rows="2" placeholder="感受…" onblur="saveN('${it.id}')"></textarea></div>`;

    // Food items: no shop cards, just guide + note
    if(it.cat==='food'){
      const fg=(it.foodGuide||'').replace(/\\n/g,'\n');
      const hasFg=fg.trim();
      const fn=it.foodNotes||'';
      let foodGuideHTML='';
      if(hasFg){
        const fgLines=fg.split('\n');
        const fgFirst=fgLines[0]||'';
        const fgRest=fgLines.slice(1).join('\n');
        if(fgFirst.startsWith('🏷')){
          const dealName=fgFirst.replace('🏷 团购搜：','').replace('🏷','');
          foodGuideHTML=`<div style="background:linear-gradient(135deg,#fff3ed,#fff8f0);border:1.5px dashed var(--coral);border-radius:10px;padding:10px 12px;margin-bottom:10px"><div style="font-size:11px;color:var(--coral);font-weight:600;letter-spacing:1px;margin-bottom:4px">📋 大众点评搜索以下团购名称</div><div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.4;padding:6px 8px;background:white;border-radius:6px;border:1px solid rgba(0,0,0,.06)">${dealName}</div></div><div class="s-guide-saved">${fgRest}</div>`;
        }else{
          foodGuideHTML=`<div class="s-guide-saved">${fg}</div>`;
        }
      }
      const foodContent=`<div style="margin-top:4px">
        <button class="s-expand-btn" onclick="event.stopPropagation();togGuide(this)"><span class="arr">▸</span>${hasFg?'📝 攻略/笔记':'📝 写笔记'}</button>
        <div class="s-guide">${foodGuideHTML}
        <div style="margin-top:8px"><div style="font-size:12px;color:var(--text-dim);margin-bottom:4px">${hasFg?'✏️ 我的笔记：':''}</div>
        <textarea placeholder="写你自己的笔记…" onblur="saveFoodNotes('${it.id}',this)">${fn}</textarea></div></div>
      </div>`;
      return`<div class="group"><div class="group-head" onclick="togGrp(this)"><span class="g-exp ${autoOpen?'open':''}">▸</span><div class="g-dot ${it.cat}"></div><div class="g-title ${done?'done-t':''}">${it.title}</div><div class="g-tags">${tags}</div><div class="g-actions">${right}</div></div><div class="shops-wrap ${autoOpen?'open':''}">${foodContent}${noteH}</div></div>`;
    }

    return`<div class="group"><div class="group-head" onclick="togGrp(this)"><span class="g-exp ${autoOpen?'open':''}">▸</span><div class="g-dot ${it.cat}"></div><div class="g-title ${done?'done-t':''}">${it.title}<span class="g-count-label"> · ${it.shops.length}家</span></div><div class="g-tags">${tags}</div><div class="g-actions">${right}</div></div><div class="shops-wrap ${autoOpen?'open':''}">${sc}${showAllBtn}${addBtn}${editBtn}${noteH}</div></div>`;
  }

  let h='';
  if(kidsArea){
    // Split nearby (<3km) vs far
    const nearUn=un.filter(i=>closestShopDist(i,kidsArea)<3);
    const farUn=un.filter(i=>closestShopDist(i,kidsArea)>=3);
    const nearWalk=nearUn.filter(i=>!i.appt);
    const nearAppt=nearUn.filter(i=>i.appt);
    if(nearWalk.length)h+=`<div class="sec-label">⚡ 3km内 · 随时去</div>${nearWalk.map(i=>rg(i,true)).join('')}`;
    if(nearAppt.length)h+=`<div class="sec-label">📍 3km内 · 需预约</div>${nearAppt.map(i=>rg(i,true)).join('')}`;
    const farWalk=farUn.filter(i=>!i.appt);
    const farAppt=farUn.filter(i=>i.appt);
    if(farWalk.length)h+=`<div class="sec-label">🚶 更远 · 随时去</div>${farWalk.map(i=>rg(i,false)).join('')}`;
    if(farAppt.length)h+=`<div class="sec-label">🔖 更远 · 需预约</div>${farAppt.map(i=>rg(i,false)).join('')}`;
  }else{if(un.length)h+=`<div class="sec-label">待打卡</div>${un.map(i=>rg(i,false)).join('')}`}
  if(dn.length)h+=`<div class="sec-label">已完成 ✨</div>${dn.map(i=>rg(i,false)).join('')}`;

  // Add item button
  const catLabels={all:'项目',body:'身体项目',look:'形象项目',exp:'体验项目',kids:'带娃项目',food:'美食项目'};
  h+=`<button class="add-item-btn" onclick="openAddItem()">+ 添加${catLabels[catFilter]||'项目'}</button>`;

  el.innerHTML=h;updateE();
}

// Interactions
function togGrp(head){head.querySelector('.g-exp').classList.toggle('open');head.nextElementSibling.classList.toggle('open')}
function showAllShops(btn){
  const wrap=btn.parentElement;
  wrap.querySelectorAll('[data-extra]').forEach(el=>el.style.display='');
  btn.remove();
}
function togShop(id,idx){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].done=!it.shops[idx].done;save();render()}}
function togFood(id){const it=items.find(i=>i.id===id);if(it){it.done=!it.done;save();render()}}
function saveFoodGuide(id,ta){const it=items.find(i=>i.id===id);if(it){it.foodGuide=ta.value.trim();save();}}
function saveFoodNotes(id,ta){const it=items.find(i=>i.id===id);if(it){it.foodNotes=ta.value.trim();save();}}

// Open app with fallback to web URL
function openApp(scheme,webUrl){
  // On iOS, just open the web URL directly - it will trigger Universal Link if app is installed
  window.location.href=webUrl;
}
function chgCnt(id,d){const it=items.find(i=>i.id===id);if(it){it.count=Math.max(0,Math.min(it.target,it.count+d));save();render()}}
function togGuide(btn){btn.classList.toggle('open');const g=btn.nextElementSibling;g.classList.toggle('show')}
function saveG(id,idx,ta){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].guide=ta.value.trim();save()}}
function saveNotes(id,idx,ta){const it=items.find(i=>i.id===id);if(it&&it.shops[idx]!==undefined){it.shops[idx].myNotes=ta.value.trim();save()}}
function openN(id){const t=document.getElementById('n-'+id);t.classList.toggle('show');if(t.classList.contains('show'))t.focus()}
function saveN(id){const t=document.getElementById('n-'+id);const it=items.find(i=>i.id===id);if(it){it.note=t.value.trim();save();setTimeout(()=>render(),100)}}

// === PANEL (Add/Edit Shop) ===
let panelMode='add',panelItemId='',panelShopIdx=-1;

function populateAreaDatalist(){
  const dl=document.getElementById('areaList');
  const areas=allAreas();
  dl.innerHTML=areas.map(a=>`<option value="${a}">`).join('');
}

function openAdd(itemId){
  panelMode='add';panelItemId=itemId;panelShopIdx=-1;
  document.getElementById('panelTitle').textContent='添加店铺';
  document.getElementById('pName').value='';
  document.getElementById('pArea').value='';
  document.getElementById('pAddr').value='';
  document.getElementById('pDzdp').value='';
  document.getElementById('pXhs').value='';
  document.getElementById('pNote').value='';
  document.getElementById('pDel').style.display='none';
  populateAreaDatalist();
  showPanel();
}

function openEdit(itemId,shopIdx){
  panelMode='edit';panelItemId=itemId;panelShopIdx=shopIdx;
  const it=items.find(i=>i.id===itemId);
  if(!it||!it.shops[shopIdx])return;
  const s=it.shops[shopIdx];
  document.getElementById('panelTitle').textContent='编辑店铺';
  document.getElementById('pName').value=s.name||'';
  document.getElementById('pArea').value=s.area||'';
  document.getElementById('pAddr').value=s.addr||'';
  document.getElementById('pDzdp').value=s.url||'';
  document.getElementById('pXhs').value=s.xhs||'';
  document.getElementById('pNote').value=s.note||'';
  document.getElementById('pDel').style.display='block';
  populateAreaDatalist();
  showPanel();
}

function showPanel(){
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById('panel').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('pName').focus(),300);
}

function closePanel(){
  document.getElementById('panelOverlay').classList.remove('show');
  document.getElementById('panel').classList.remove('show');
  document.body.style.overflow='';
}

function savePanel(){
  const name=document.getElementById('pName').value.trim();
  if(!name){document.getElementById('pName').style.borderColor='#d44';return}
  const area=document.getElementById('pArea').value.trim()||'待定';
  const addr=document.getElementById('pAddr').value.trim();
  const url=document.getElementById('pDzdp').value.trim();
  const xhs=document.getElementById('pXhs').value.trim();
  const note=document.getElementById('pNote').value.trim();

  const it=items.find(i=>i.id===panelItemId);
  if(!it)return;

  if(panelMode==='add'){
    it.shops.push({name,area,addr,url,xhs,note,guide:'',done:false});
  }else{
    const s=it.shops[panelShopIdx];
    if(s){s.name=name;s.area=area;s.addr=addr;s.url=url;s.xhs=xhs;s.note=note}
  }
  save();closePanel();buildChips();render();
}

function delShop(){
  if(!confirm('确定删除这家店铺？'))return;
  const it=items.find(i=>i.id===panelItemId);
  if(it&&it.shops[panelShopIdx]!==undefined){
    it.shops.splice(panelShopIdx,1);
    if(it.shops.length===0)it.shops.push({name:'待找店',area:'待定',url:'',xhs:'',note:'',guide:'',done:false});
    save();closePanel();buildChips();render();
  }
}

// === ITEM PANEL (Add/Edit Item) ===
let itemPanelMode='add',editItemId='',selectedCat='';
const CAT_PTS={body:20,look:10,exp:15,kids:15,food:8};

function pickCat(cat){
  selectedCat=cat;
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(b.dataset.cat===cat)b.classList.add('sel-'+cat);
  });
}

function toggleTarget(){
  const isCounter=document.querySelector('input[name="iType"]:checked').value==='counter';
  document.getElementById('iTarget').style.display=isCounter?'block':'none';
}

function openAddItem(){
  itemPanelMode='add';editItemId='';
  document.getElementById('itemPanelTitle').textContent='添加项目';
  document.getElementById('iName').value='';
  document.querySelector('input[name="iType"][value="check"]').checked=true;
  toggleTarget();
  document.getElementById('iAppt').checked=false;
  document.getElementById('iTarget').value='5';
  document.getElementById('iDel').style.display='none';
  // Pre-select category if on a specific tab
  selectedCat=catFilter!=='all'?catFilter:'';
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(selectedCat&&b.dataset.cat===selectedCat)b.classList.add('sel-'+selectedCat);
  });
  document.getElementById('itemPanelOverlay').classList.add('show');
  document.getElementById('itemPanel').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('iName').focus(),300);
}

function closeItemPanel(){
  document.getElementById('itemPanelOverlay').classList.remove('show');
  document.getElementById('itemPanel').classList.remove('show');
  document.body.style.overflow='';
}

function saveItem(){
  const name=document.getElementById('iName').value.trim();
  if(!name){document.getElementById('iName').style.borderColor='#d44';return}
  if(!selectedCat){alert('请选择分类');return}
  const isCounter=document.querySelector('input[name="iType"]:checked').value==='counter';
  const target=isCounter?parseInt(document.getElementById('iTarget').value)||5:0;
  const appt=document.getElementById('iAppt').checked;

  if(itemPanelMode==='add'){
    const id='custom_'+Date.now();
    const newItem={
      id,title:name,cat:selectedCat,appt,
      type:isCounter?'counter':'check',
      target:isCounter?target:0,count:0,
      shops:[{name:'待找店',area:'待定',url:'',xhs:'',note:'',guide:'',done:false}],
      note:'',pts:CAT_PTS[selectedCat]||10
    };
    if(isCounter) newItem.eventDate=undefined;
    items.push(newItem);
  } else {
    const it=items.find(i=>i.id===editItemId);
    if(it){
      it.title=name;it.cat=selectedCat;it.appt=appt;
      it.type=isCounter?'counter':'check';
      if(isCounter){it.target=target;if(!it.count)it.count=0}
      it.pts=CAT_PTS[selectedCat]||10;
    }
  }
  save();closeItemPanel();render();
}

function openEditItem(id){
  const it=items.find(i=>i.id===id);
  if(!it)return;
  itemPanelMode='edit';editItemId=id;
  document.getElementById('itemPanelTitle').textContent='编辑项目';
  document.getElementById('iName').value=it.title;
  selectedCat=it.cat;
  document.querySelectorAll('.panel-cat-btn').forEach(b=>{
    b.className='panel-cat-btn';
    if(b.dataset.cat===selectedCat)b.classList.add('sel-'+selectedCat);
  });
  if(it.type==='counter'){
    document.querySelector('input[name="iType"][value="counter"]').checked=true;
    document.getElementById('iTarget').value=it.target||5;
  }else{
    document.querySelector('input[name="iType"][value="check"]').checked=true;
  }
  toggleTarget();
  document.getElementById('iAppt').checked=it.appt||false;
  document.getElementById('iDel').style.display='block';
  document.getElementById('itemPanelOverlay').classList.add('show');
  document.getElementById('itemPanel').classList.add('show');
  document.body.style.overflow='hidden';
}

function delItem(){
  if(!confirm('确定删除这个项目？所有店铺和打卡记录都会丢失。'))return;
  items=items.filter(i=>i.id!==editItemId);
  save();closeItemPanel();render();
}

// === FILTER EVENTS ===
// Area filter handled by dropdown onchange
document.getElementById('kidsAct').addEventListener('change',e=>{
  kidsArea=e.target.value||'';
  myGPS=null;
  document.getElementById('geoBtn').textContent='📍 定位';
  document.getElementById('geoBtn').classList.remove('active');
  render();
});

// Time input - auto-format as user types and validate on blur
const dpTimeEl=document.getElementById('dpTime');
if(dpTimeEl){
  dpTimeEl.addEventListener('input',e=>formatTimeInput(e.target));
  dpTimeEl.addEventListener('blur',e=>validateTimeInput(e.target));
}

// === GEOLOCATION ===
let myGPS=null;
function getMyLocation(){
  const btn=document.getElementById('geoBtn');
  btn.classList.add('loading');btn.textContent='定位中…';
  if(!navigator.geolocation){btn.textContent='不支持定位';btn.classList.remove('loading');return}
  navigator.geolocation.getCurrentPosition(pos=>{
    myGPS=[pos.coords.latitude,pos.coords.longitude];
    btn.classList.remove('loading');btn.classList.add('active');btn.textContent='📍 已定位';
    document.getElementById('kidsAct').value='';
    kidsArea='__gps__';
    render();
  },err=>{
    btn.classList.remove('loading');btn.textContent='📍 定位失败';
    setTimeout(()=>{btn.textContent='📍 定位'},2000);
  },{enableHighAccuracy:true,timeout:10000});
}

// Override distance functions to support GPS
const _origShopDist=shopDist;
shopDist=function(shop,targetArea){
  if(targetArea==='__gps__'&&myGPS){
    const sc=getCoord(shop.area);
    return distKm(myGPS,sc);
  }
  return _origShopDist(shop,targetArea);
};
const _origClosest=closestShopDist;
closestShopDist=function(item,targetArea){
  if(targetArea==='__gps__'&&myGPS){
    return Math.min(...item.shops.map(s=>{const sc=getCoord(s.area);return distKm(myGPS,sc)}));
  }
  return _origClosest(item,targetArea);
};

// === SEARCH ===
let searchQuery='';
function onSearch(val){
  searchQuery=val.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('show',searchQuery.length>0);
  render();
  if(searchQuery){
    setTimeout(()=>{const c=document.getElementById('content');if(c&&c.firstElementChild)c.firstElementChild.scrollIntoView({behavior:'smooth',block:'start'})},100);
  }
}
function clearSearch(){
  searchQuery='';
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  render();
}
function matchesSearch(it){
  if(!searchQuery)return true;
  const q=searchQuery;
  // Search title
  if(it.title.toLowerCase().includes(q))return true;
  // Search shops: name, area, addr, note, guide, myNotes
  if(it.shops&&it.shops.some(s=>{
    if(s.name&&s.name.toLowerCase().includes(q))return true;
    if(s.area&&s.area.toLowerCase().includes(q))return true;
    if(s.addr&&s.addr.toLowerCase().includes(q))return true;
    if(s.note&&s.note.toLowerCase().includes(q))return true;
    if(s.guide&&s.guide.toLowerCase().includes(q))return true;
    if(s.myNotes&&s.myNotes.toLowerCase().includes(q))return true;
    return false;
  }))return true;
  // Search foodGuide and foodNotes
  if(it.foodGuide&&it.foodGuide.toLowerCase().includes(q))return true;
  if(it.foodNotes&&it.foodNotes.toLowerCase().includes(q))return true;
  // Search item note
  if(it.note&&it.note.toLowerCase().includes(q))return true;
  return false;
}

buildChips();
renderToday();

  navigator.serviceWorker.register('./sw.js').catch(()=>{});
